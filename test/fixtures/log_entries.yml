analyzed_error:
  source_container: web
  stream: stderr
  message: "RuntimeError: connection refused"
  fingerprint: "analyzed-error-fingerprint"
  occurrence_count: 1
  first_seen_at: <%= 5.minutes.ago %>
  last_seen_at: <%= 5.minutes.ago %>
  analysis_status: analyzed
  classification: connectivity
  urgency: high
  needs_action: true
  fixes:
    - "Verify the database host and port in the app environment."
  other_suggestions:
    - "Check recent deploys for dependency changes."
  raw_payload: {}
  created_at: <%= 5.minutes.ago %>
  updated_at: <%= 5.minutes.ago %>

pending_warning:
  source_container: worker
  stream: stdout
  message: "Retrying failed request"
  fingerprint: "pending-warning-fingerprint"
  occurrence_count: 1
  first_seen_at: <%= 2.minutes.ago %>
  last_seen_at: <%= 2.minutes.ago %>
  analysis_status: pending
  raw_payload: {}
  created_at: <%= 2.minutes.ago %>
  updated_at: <%= 2.minutes.ago %>

failed_inference:
  source_container: api
  stream: stderr
