  last_seen_at: <%= 3.minutes.ago %>
  analysis_status: failed
  analysis_error: "Inference server returned 405: Method Not Allowed"
  raw_payload: {}
  created_at: <%= 3.minutes.ago %>
  updated_at: <%= 3.minutes.ago %>

analyzed_info:
  source_container: web
  stream: stdout
  message: "Health check OK"
