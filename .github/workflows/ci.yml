name: CI

on:
  pull_request:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - staging

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run tests
        run: docker compose -f docker-compose.test.yml run --rm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run RuboCop
        run: docker compose -f docker-compose.lint.yml run --rm rubocop
