name: loglady-server

services:
  redis:
    image: redis:8
    container_name: loglady-server-redis
    volumes:
      - loglady-server-redis:/data
    networks:
      - loglady-server

  web:
    image: ghcr.io/romkey/loglady:latest
    depends_on:
      - redis
    environment:
      RAILS_ENV: production
      LOGLADY_COMPOSE_PROJECT: loglady-server
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      INFERENCE_URL: ${INFERENCE_URL}
      INFERENCE_API_KEY: ${INFERENCE_API_KEY}
      INFERENCE_MODEL: ${INFERENCE_MODEL:-log-analyzer}
      INFERENCE_FALLBACK_MODEL: ${INFERENCE_FALLBACK_MODEL:-}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/up']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s
    ports:
      - "3000:3000"
    labels:
      loglady.io/skip-log-import: "true"
    networks:
      - loglady-server

  sidekiq:
    image: ghcr.io/romkey/loglady:latest
    command: bundle exec sidekiq
    depends_on:
      redis:
        condition: service_started
      web:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      LOGLADY_COMPOSE_PROJECT: loglady-server
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      INFERENCE_URL: ${INFERENCE_URL}
      INFERENCE_API_KEY: ${INFERENCE_API_KEY}
      INFERENCE_MODEL: ${INFERENCE_MODEL:-log-analyzer}
      INFERENCE_FALLBACK_MODEL: ${INFERENCE_FALLBACK_MODEL:-}
    group_add:
      - "${DOCKER_GID:-999}"
    labels:
      loglady.io/skip-log-import: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - loglady-server

volumes:
  loglady-server-redis:

networks:
  loglady-server:
    name: loglady-server
