name: loglady-server

services:
  redis:
    image: redis:8
    container_name: loglady-server-redis
    volumes:
      - loglady-server-redis:/data
    networks:
      - loglady-server

  web:
    image: ghcr.io/romkey/loglady:latest
    depends_on:
      - redis
    environment:
      RAILS_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      INFERENCE_URL: ${INFERENCE_URL}
      INFERENCE_API_KEY: ${INFERENCE_API_KEY}
      INFERENCE_MODEL: ${INFERENCE_MODEL:-log-analyzer}
    ports:
      - "3000:3000"
    networks:
      - loglady-server

  sidekiq:
    image: ghcr.io/romkey/loglady:latest
    command: bundle exec sidekiq
    depends_on:
      - redis
    environment:
      RAILS_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      INFERENCE_URL: ${INFERENCE_URL}
      INFERENCE_API_KEY: ${INFERENCE_API_KEY}
      INFERENCE_MODEL: ${INFERENCE_MODEL:-log-analyzer}
    networks:
      - loglady-server

  migrate:
    profiles: ["tools"]
    image: ghcr.io/romkey/loglady:latest
    command: ./bin/rails db:migrate
    environment:
      RAILS_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
    networks:
      - loglady-server

volumes:
  loglady-server-redis:

networks:
  loglady-server:
    name: loglady-server
