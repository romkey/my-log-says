name: loglady-test

services:
  postgresql:
    image: postgres:18
    container_name: loglady-test-postgresql
    environment:
      POSTGRES_DB: loglady_test
      POSTGRES_USER: loglady
      POSTGRES_PASSWORD: loglady
    volumes:
      - loglady-test-postgresql:/var/lib/postgresql
    networks:
      - loglady-test

  redis:
    image: redis:8
    container_name: loglady-test-redis
    volumes:
      - loglady-test-redis:/data
    networks:
      - loglady-test

  test:
    image: ruby:3.3.11
    working_dir: /rails
    command: bash -lc "bundle check || bundle install; ./bin/rails db:prepare && ./bin/rails test"
    depends_on:
      - postgresql
      - redis
    environment:
      RAILS_ENV: test
      DB_HOST: postgresql
      DB_NAME: loglady_test
      DB_USERNAME: loglady
      DB_PASSWORD: loglady
      REDIS_URL: redis://redis:6379/1
      INFERENCE_URL: https://example.test/analyze
      INFERENCE_API_KEY: test-key
    volumes:
      - .:/rails
      - loglady-test-bundle:/usr/local/bundle
    networks:
      - loglady-test

volumes:
  loglady-test-postgresql:
  loglady-test-redis:
  loglady-test-bundle:

networks:
  loglady-test:
    name: loglady-test
