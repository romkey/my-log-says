name: mylogsays-test

services:
  postgresql:
    image: postgres:18
    container_name: mylogsays-test-postgresql
    environment:
      POSTGRES_DB: mylogsays_test
      POSTGRES_USER: mylogsays
      POSTGRES_PASSWORD: mylogsays
    volumes:
      - mylogsays-test-postgresql:/var/lib/postgresql
    networks:
      - mylogsays-test

  redis:
    image: redis:8
    container_name: mylogsays-test-redis
    volumes:
      - mylogsays-test-redis:/data
    networks:
      - mylogsays-test

  test:
    image: ruby:3.3.11
    working_dir: /rails
    command: bash -lc "bundle check || bundle install; ./bin/rails db:prepare && ./bin/rails test"
    depends_on:
      - postgresql
      - redis
    environment:
      RAILS_ENV: test
      DB_HOST: postgresql
      DB_NAME: mylogsays_test
      DB_USERNAME: mylogsays
      DB_PASSWORD: mylogsays
      REDIS_URL: redis://redis:6379/1
      INFERENCE_URL: https://example.test/analyze
      INFERENCE_API_KEY: test-key
    volumes:
      - .:/rails
      - mylogsays-test-bundle:/usr/local/bundle
    networks:
      - mylogsays-test

volumes:
  mylogsays-test-postgresql:
  mylogsays-test-redis:
  mylogsays-test-bundle:

networks:
  mylogsays-test:
    name: mylogsays-test
