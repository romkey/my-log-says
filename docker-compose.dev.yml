name: loglady-dev

services:
  postgresql:
    image: postgres:18
    container_name: loglady-dev-postgresql
    environment:
      POSTGRES_DB: loglady_development
      POSTGRES_USER: loglady
      POSTGRES_PASSWORD: loglady
    ports:
      - "15432:5432"
    volumes:
      - loglady-dev-postgresql:/var/lib/postgresql/data
    networks:
      - loglady-dev

  redis:
    image: redis:8
    container_name: loglady-dev-redis
    ports:
      - "16379:6379"
    volumes:
      - loglady-dev-redis:/data
    networks:
      - loglady-dev

  web:
    image: ruby:3.3.11
    working_dir: /rails
    command: bash -lc "bundle check || bundle install; ./bin/rails server -b 0.0.0.0"
    depends_on:
      - postgresql
      - redis
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: postgresql
      REDIS_URL: redis://redis:6379/0
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
      - loglady-dev-bundle:/usr/local/bundle
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - loglady-dev

  sidekiq:
    image: ruby:3.3.11
    working_dir: /rails
    command: bash -lc "bundle check || bundle install; bundle exec sidekiq"
    depends_on:
      - postgresql
      - redis
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: postgresql
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/rails
      - loglady-dev-bundle:/usr/local/bundle
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - loglady-dev

  migrate:
    profiles: ["tools"]
    image: ruby:3.3.11
    working_dir: /rails
    command: bash -lc "bundle check || bundle install; ./bin/rails db:prepare"
    depends_on:
      - postgresql
      - redis
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: postgresql
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/rails
      - loglady-dev-bundle:/usr/local/bundle
    networks:
      - loglady-dev

volumes:
  loglady-dev-postgresql:
  loglady-dev-redis:
  loglady-dev-bundle:

networks:
  loglady-dev:
    name: loglady-dev
