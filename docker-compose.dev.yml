name: loglady-dev

services:
  postgresql:
    image: postgres:18
    container_name: loglady-dev-postgresql
    environment:
      POSTGRES_DB: loglady_development
      POSTGRES_USER: loglady
      POSTGRES_PASSWORD: loglady
    ports:
      - "15432:5432"
    volumes:
      - loglady-dev-postgresql:/var/lib/postgresql/data
    networks:
      - loglady-dev

  redis:
    image: redis:8
    container_name: loglady-dev-redis
    ports:
      - "16379:6379"
    volumes:
      - loglady-dev-redis:/data
    networks:
      - loglady-dev

  web:
    image: ruby:3.3.11
    working_dir: /rails
    command: bash -lc "bundle check || bundle install; exec ./bin/docker-entrypoint ./bin/rails server -b 0.0.0.0"
    depends_on:
      - postgresql
      - redis
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: postgresql
      LOGLADY_COMPOSE_PROJECT: loglady-dev
      REDIS_URL: redis://redis:6379/0
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/up || exit 1']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 60s
    ports:
      - "3000:3000"
    labels:
      loglady.io/skip-log-import: "true"
    volumes:
      - .:/rails
      - loglady-dev-bundle:/usr/local/bundle
    networks:
      - loglady-dev

  sidekiq:
    image: ruby:3.3.11
    working_dir: /rails
    command: bash -lc "bundle check || bundle install; exec ./bin/docker-entrypoint bundle exec sidekiq"
    depends_on:
      postgresql:
        condition: service_started
      redis:
        condition: service_started
      web:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: postgresql
      LOGLADY_COMPOSE_PROJECT: loglady-dev
      REDIS_URL: redis://redis:6379/0
    group_add:
      - "${DOCKER_GID:-999}"
    labels:
      loglady.io/skip-log-import: "true"
    volumes:
      - .:/rails
      - loglady-dev-bundle:/usr/local/bundle
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - loglady-dev

volumes:
  loglady-dev-postgresql:
  loglady-dev-redis:
  loglady-dev-bundle:

networks:
  loglady-dev:
    name: loglady-dev
